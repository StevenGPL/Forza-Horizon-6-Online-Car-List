<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地平线车辆清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .car-table {
            width: 100%;
            table-layout: fixed;
        }

        .car-table th,
        .car-table td {
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
            vertical-align: middle;
        }

        .brand-text {
            white-space: pre-line;
        }

        .car-image {
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .car-table {
                min-width: 1120px;
            }
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 p-2 sm:p-4 md:p-6">

    <div class="w-full max-w-[1280px] mx-auto bg-white rounded-lg shadow-lg overflow-hidden">

        <div class="p-3 md:p-4 bg-gray-50 border-b flex flex-col gap-3 lg:flex-row lg:justify-between lg:items-center">
            <div class="flex items-baseline gap-3 flex-wrap">
                <h1 class="text-lg md:text-xl font-bold">地平线6车辆清单</h1>
                <p id="collectionSummary" class="text-sm text-gray-600">已收集：0 / 0</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button id="toggleSortBtn"
                    class="px-3 py-2 bg-gray-200 hover:bg-gray-300 rounded text-sm font-medium transition">
                    当前排序: 英文品牌排序
                </button>
                <button id="openExportModalBtn"
                    class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium transition">
                    导出数据
                </button>
                <button id="openImportModalBtn"
                    class="px-3 py-2 bg-green-500 hover:bg-green-600 text-white rounded text-sm font-medium transition">
                    导入数据
                </button>
                <input type="file" id="importInput" accept=".json" class="hidden">
            </div>
        </div>

        <div class="overflow-x-auto no-scrollbar">
            <table class="car-table text-left border-collapse text-xs sm:text-sm">
                <colgroup>
                    <col style="width: 8%;">
                    <col style="width: 6%;">
                    <col style="width: 12%;">
                    <col style="width: 14%;">
                    <col style="width: 5%;">
                    <col style="width: 16%;">
                    <col style="width: 14%;">
                    <col style="width: 7%;">
                    <col style="width: 10%;">
                    <col style="width: 5%;">
                    <col style="width: 6%;">
                </colgroup>
                <thead>
                    <tr class="bg-gray-200 text-gray-600 text-xs sm:text-sm">
                        <th class="p-2 md:p-3 border-b text-center">图片（点击可放大）</th>
                        <th class="p-2 md:p-3 border-b text-center">已获得</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300">
                            <div class="flex items-center gap-1 flex-wrap">
                                <span>品牌</span>
                                <button id="brandFilterBtn"
                                    class="px-2 py-1 text-[11px] sm:text-xs bg-indigo-500 hover:bg-indigo-600 text-white rounded">筛选</button>
                                <button id="resetBrandFilterBtn"
                                    class="px-2 py-1 text-[11px] sm:text-xs bg-gray-300 hover:bg-gray-400 text-gray-800 rounded">重置</button>
                            </div>
                        </th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300">车名</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300 text-center">年份</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300">获取方式</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300">
                            <div class="flex items-center gap-1 flex-wrap">
                                <span>车辆类型</span>
                                <button id="carTypeFilterBtn"
                                    class="px-2 py-1 text-[11px] sm:text-xs bg-indigo-500 hover:bg-indigo-600 text-white rounded">筛选</button>
                                <button id="resetCarTypeFilterBtn"
                                    class="px-2 py-1 text-[11px] sm:text-xs bg-gray-300 hover:bg-gray-400 text-gray-800 rounded">重置</button>
                            </div>
                        </th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300 text-right">价值 CR</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300 text-center">稀有度</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300 text-center">国籍</th>
                        <th class="p-2 md:p-3 border-b border-l border-gray-300 text-center">初始分</th>
                    </tr>
                </thead>
                <tbody id="carTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="brandModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-3xl rounded-lg shadow-xl p-4 sm:p-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base sm:text-lg font-semibold">品牌筛选</h2>
                <button id="closeBrandModalX" class="text-gray-500 hover:text-gray-700 text-xl leading-none">×</button>
            </div>
            <div id="brandOptions" class="grid grid-cols-5 gap-2 max-h-[50vh] overflow-y-auto p-1"></div>
            <div class="mt-4 flex justify-end gap-2">
                <button id="cancelBrandFilterBtn"
                    class="px-3 py-2 text-sm bg-gray-200 hover:bg-gray-300 rounded">取消</button>
                <button id="applyBrandFilterBtn"
                    class="px-3 py-2 text-sm bg-indigo-500 hover:bg-indigo-600 text-white rounded">提交</button>
            </div>
        </div>
    </div>

    <div id="carTypeModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-3xl rounded-lg shadow-xl p-4 sm:p-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base sm:text-lg font-semibold">车辆类型筛选</h2>
                <button id="closeCarTypeModalX" class="text-gray-500 hover:text-gray-700 text-xl leading-none">×</button>
            </div>
            <div id="carTypeOptions" class="grid grid-cols-2 gap-2 max-h-[50vh] overflow-y-auto p-1"></div>
            <div class="mt-4 flex justify-end gap-2">
                <button id="cancelCarTypeFilterBtn"
                    class="px-3 py-2 text-sm bg-gray-200 hover:bg-gray-300 rounded">取消</button>
                <button id="applyCarTypeFilterBtn"
                    class="px-3 py-2 text-sm bg-indigo-500 hover:bg-indigo-600 text-white rounded">提交</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4 cursor-zoom-out">
        <img id="imageModalPreview" src="" alt="" class="max-w-[95vw] max-h-[90vh] object-contain rounded shadow-2xl">
    </div>

    <div id="exportChoiceModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-lg shadow-xl p-4">
            <h3 class="text-base font-semibold mb-3">导出数据</h3>
            <div class="flex flex-col gap-2">
                <button id="exportCopyBtn" class="px-3 py-2 rounded bg-blue-500 hover:bg-blue-600 text-white text-sm">复制到剪贴板</button>
                <button id="exportFileBtn" class="px-3 py-2 rounded bg-indigo-500 hover:bg-indigo-600 text-white text-sm">导出为文件</button>
                <button id="exportCancelBtn" class="px-3 py-2 rounded bg-gray-200 hover:bg-gray-300 text-sm">取消</button>
            </div>
        </div>
    </div>

    <div id="importChoiceModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-lg shadow-xl p-4">
            <h3 class="text-base font-semibold mb-3">导入数据</h3>
            <div class="flex flex-col gap-2">
                <button id="importClipboardBtn" class="px-3 py-2 rounded bg-green-500 hover:bg-green-600 text-white text-sm">从剪贴板导入</button>
                <button id="importFileBtn" class="px-3 py-2 rounded bg-emerald-600 hover:bg-emerald-700 text-white text-sm">从文件导入</button>
                <button id="importCancelBtn" class="px-3 py-2 rounded bg-gray-200 hover:bg-gray-300 text-sm">取消</button>
            </div>
        </div>
    </div>

    <script>
        const rarityStyles = {
            '普通': 'bg-[#009b48] text-white',
            '稀有': 'bg-[#0092d6] text-white',
            '史诗': 'bg-[#68339b] text-white',
            '传说': 'bg-[#eab308] text-white',
            '传奇': 'bg-[#eab308] text-white',
            '极限竞速特别版': 'bg-gradient-to-r from-[#88189c] to-[#0168b4] text-white'
        };

        const LOCAL_STORAGE_KEY = 'fh_garage_data';
        let carsData = [];
        let carTypeOrderData = [];
        let currentSortMode = 'ZH';
        let activeBrandFilters = new Set();
        let draftBrandFilters = new Set();
        let activeCarTypeFilters = new Set();
        let draftCarTypeFilters = new Set();
        let carTypeOrderMap = new Map();
        let currentPreviewSrc = '';

        const getScoreColor = (scoreStr = '') => {
            if (scoreStr.startsWith('D')) return 'text-blue-500';
            if (scoreStr.startsWith('C')) return 'text-yellow-400';
            if (scoreStr.startsWith('B')) return 'text-orange-400';
            if (scoreStr.startsWith('A')) return 'text-red-500';
            if (scoreStr.startsWith('S1')) return 'text-purple-600';
            if (scoreStr.startsWith('S2')) return 'text-blue-600';
            if (scoreStr.startsWith('X')) return 'text-green-500';
            return 'text-gray-700';
        };

        function getUserData() {
            return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || {};
        }

        function formatBrandForDisplay(brand) {
            return String(brand || '').replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
        }

        function getOptimizedImageSrc(originalPath) {
            if (!originalPath) return '';
            const normalized = originalPath.replace(/^\.\//, '/');
            // Cloudflare Image Resizing: 传输时按约 1/4 尺寸下发。
            return `/cdn-cgi/image/width=335,quality=188,format=webp${normalized}`;
        }

        function formatCrValue(value) {
            if (value === '' || value === null || value === undefined) return '';
            if (typeof value === 'number') return value.toLocaleString('en-US');

            const text = String(value).trim();
            if (text === '' || text === '?') return text;
            const numeric = Number(text.replace(/,/g, ''));
            if (!Number.isNaN(numeric) && Number.isFinite(numeric)) {
                return numeric.toLocaleString('en-US');
            }
            return text;
        }

        function toggleCar(id, checked) {
            const userData = getUserData();
            if (checked) {
                userData[id] = { owned: true };
            } else {
                delete userData[id];
            }
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(userData));
            updateCollectionSummary();
        }

        function getSortedCars() {
            return [...carsData].sort((a, b) => {
                if (currentSortMode === 'EN') {
                    if (a.en_brand_order !== b.en_brand_order) return a.en_brand_order - b.en_brand_order;
                } else {
                    if (a.zh_brand_order !== b.zh_brand_order) return a.zh_brand_order - b.zh_brand_order;
                }
                return a.brand_internal_order - b.brand_internal_order;
            });
        }

        function getVisibleCars() {
            const sorted = getSortedCars();
            return sorted.filter((car) => {
                const brandMatched = !activeBrandFilters.size || activeBrandFilters.has(car.brand);
                const typeMatched = !activeCarTypeFilters.size || activeCarTypeFilters.has(car.car_type_cn || '');
                return brandMatched && typeMatched;
            });
        }

        function getSortedBrands() {
            const map = new Map();
            carsData.forEach((car) => {
                if (!map.has(car.brand)) {
                    map.set(car.brand, {
                        brand: car.brand,
                        en_brand_order: car.en_brand_order,
                        zh_brand_order: car.zh_brand_order
                    });
                }
            });

            return [...map.values()]
                .sort((a, b) => {
                    if (currentSortMode === 'EN') {
                        return a.en_brand_order - b.en_brand_order;
                    }
                    return a.zh_brand_order - b.zh_brand_order;
                })
                .map((item) => item.brand);
        }

        function buildCarTypeOrderMap() {
            carTypeOrderMap = new Map();
            carTypeOrderData.forEach((item, index) => {
                const key = String(item.car_type_cn || '').trim();
                if (!key) return;
                const order = Number(item.car_type_order);
                carTypeOrderMap.set(key, Number.isFinite(order) ? order : index + 1);
            });
        }

        function getSortedCarTypes() {
            const uniqueTypes = [...new Set(carsData.map((car) => String(car.car_type_cn || '').trim()).filter(Boolean))];
            return uniqueTypes.sort((a, b) => {
                const orderA = carTypeOrderMap.get(a) ?? Number.MAX_SAFE_INTEGER;
                const orderB = carTypeOrderMap.get(b) ?? Number.MAX_SAFE_INTEGER;
                if (orderA !== orderB) return orderA - orderB;
                return a.localeCompare(b, 'zh-Hans-CN');
            });
        }

        function updateCollectionSummary() {
            const userData = getUserData();
            const total = carsData.length;
            const owned = carsData.reduce((count, car) => {
                return count + (userData[car.id]?.owned ? 1 : 0);
            }, 0);
            document.getElementById('collectionSummary').innerText = `已收集：${owned} / ${total}`;
        }

        function renderBrandFilterOptions() {
            const container = document.getElementById('brandOptions');
            const brands = getSortedBrands();
            container.innerHTML = brands.map((brand) => {
                const checked = draftBrandFilters.has(brand) ? 'checked' : '';
                const encodedBrand = encodeURIComponent(brand);
                return `
                    <label class="flex items-start gap-2 p-2 border rounded hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" class="mt-0.5 brand-filter-option" data-brand="${encodedBrand}" ${checked}>
                        <span class="text-xs sm:text-sm brand-text">${formatBrandForDisplay(brand)}</span>
                    </label>
                `;
            }).join('');
        }

        function renderCarTypeFilterOptions() {
            const container = document.getElementById('carTypeOptions');
            const carTypes = getSortedCarTypes();
            container.innerHTML = carTypes.map((type) => {
                const checked = draftCarTypeFilters.has(type) ? 'checked' : '';
                const encodedType = encodeURIComponent(type);
                return `
                    <label class="flex items-start gap-2 p-2 border rounded hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" class="mt-0.5 car-type-filter-option" data-car-type="${encodedType}" ${checked}>
                        <span class="text-xs sm:text-sm">${type}</span>
                    </label>
                `;
            }).join('');
        }

        function toggleDraftBrandFilter(encodedBrand, checked) {
            const brand = decodeURIComponent(encodedBrand);
            if (checked) {
                draftBrandFilters.add(brand);
            } else {
                draftBrandFilters.delete(brand);
            }
        }

        function toggleDraftCarTypeFilter(encodedCarType, checked) {
            const carType = decodeURIComponent(encodedCarType);
            if (checked) {
                draftCarTypeFilters.add(carType);
            } else {
                draftCarTypeFilters.delete(carType);
            }
        }

        function openBrandFilterModal() {
            draftBrandFilters = new Set(activeBrandFilters);
            renderBrandFilterOptions();
            document.getElementById('brandModal').classList.remove('hidden');
            document.getElementById('brandModal').classList.add('flex');
        }

        function closeBrandFilterModal() {
            document.getElementById('brandModal').classList.add('hidden');
            document.getElementById('brandModal').classList.remove('flex');
        }

        function openCarTypeFilterModal() {
            draftCarTypeFilters = new Set(activeCarTypeFilters);
            renderCarTypeFilterOptions();
            document.getElementById('carTypeModal').classList.remove('hidden');
            document.getElementById('carTypeModal').classList.add('flex');
        }

        function closeCarTypeFilterModal() {
            document.getElementById('carTypeModal').classList.add('hidden');
            document.getElementById('carTypeModal').classList.remove('flex');
        }

        function applyBrandFilter() {
            activeBrandFilters = new Set(draftBrandFilters);
            closeBrandFilterModal();
            renderTable();
        }

        function resetBrandFilter() {
            activeBrandFilters.clear();
            draftBrandFilters.clear();
            renderTable();
        }

        function applyCarTypeFilter() {
            activeCarTypeFilters = new Set(draftCarTypeFilters);
            closeCarTypeFilterModal();
            renderTable();
        }

        function resetCarTypeFilter() {
            activeCarTypeFilters.clear();
            draftCarTypeFilters.clear();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('carTableBody');
            const visibleCars = getVisibleCars();
            const userData = getUserData();

            tbody.innerHTML = visibleCars.map((car, index) => {
                const isOwned = userData[car.id]?.owned || false;
                const rowBg = index % 2 === 0 ? 'bg-gray-50' : 'bg-gray-100/50';
                const scoreColor = getScoreColor(car.initial_score || '');
                const rarityStyle = rarityStyles[car.rarity] || 'bg-gray-400 text-white';
                const optimizedImage = getOptimizedImageSrc(car.image);
                const fallbackImage = car.image;
                const encodedId = encodeURIComponent(car.id);

                return `
                    <tr class="border-b ${rowBg} hover:bg-gray-100 transition">
                        <td class="p-1 sm:p-2 text-center">
                            <img src="${optimizedImage}" alt="${car.name}" loading="lazy" data-fallback="${fallbackImage}"
                                class="w-20 sm:w-24 h-auto mx-auto drop-shadow-md car-image">
                        </td>
                        <td class="p-2 md:p-3 text-center border-l border-gray-300">
                            <input type="checkbox" class="w-4 h-4 sm:w-5 sm:h-5 cursor-pointer accent-green-600 owned-checkbox"
                                data-car-id="${encodedId}" ${isOwned ? 'checked' : ''}>
                        </td>
                        <td class="p-2 md:p-3 border-l border-gray-300 brand-text">${formatBrandForDisplay(car.brand)}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300">${car.name || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300 text-center">${car.year || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300">${car.how_to_get || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300">${car.car_type_cn || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300 text-right">${formatCrValue(car.cr)}</td>
                        <td class="p-2 md:p-3 border-l border-white border-r text-center ${rarityStyle} font-medium">${car.rarity || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300 text-center">${car.country || ''}</td>
                        <td class="p-2 md:p-3 border-l border-gray-300 text-center font-bold ${scoreColor}">${car.initial_score || ''}</td>
                    </tr>
                `;
            }).join('');

            if (!visibleCars.length) {
                tbody.innerHTML = `<tr><td colspan="11" class="text-center p-4 text-gray-500">当前筛选条件下暂无车辆。</td></tr>`;
            }

            updateCollectionSummary();
        }

        function exportData() {
            const data = localStorage.getItem(LOCAL_STORAGE_KEY) || '{}';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fh_garage_backup.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function copyDataToClipboard() {
            const data = localStorage.getItem(LOCAL_STORAGE_KEY) || '{}';
            try {
                await navigator.clipboard.writeText(data);
                alert('已复制到剪贴板。');
            } catch (error) {
                alert('复制失败，请检查浏览器剪贴板权限。');
            }
        }

        function importFromText(rawText) {
            try {
                const parsed = JSON.parse(rawText);
                if (typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)) {
                    throw new Error('invalid type');
                }
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(parsed));
                renderTable();
                alert('数据导入成功！');
                return true;
            } catch (error) {
                alert('导入失败：数据格式错误，已取消导入。');
                return false;
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                importFromText(e.target.result);
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function openSimpleModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeSimpleModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function importFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text || !text.trim()) {
                    alert('导入失败：剪贴板为空，已取消导入。');
                    return;
                }
                importFromText(text);
            } catch (error) {
                alert('读取剪贴板失败，请检查浏览器权限。');
            }
        }

        async function initApp() {
            try {
                const [carsResponse, carTypeResponse] = await Promise.all([
                    fetch('./Cars.json'),
                    fetch('./FH_Data.json')
                ]);
                if (!carsResponse.ok || !carTypeResponse.ok) throw new Error('网络响应失败');
                carsData = await carsResponse.json();
                carTypeOrderData = await carTypeResponse.json();
                buildCarTypeOrderMap();
                renderTable();
            } catch (error) {
                console.error('加载车辆数据失败:', error);
                document.getElementById('carTableBody').innerHTML = '<tr><td colspan="11" class="text-center p-4 text-red-500">无法加载车辆数据，请确保 Cars.json / FH_Data.json 存在。</td></tr>';
            }
        }

        document.getElementById('toggleSortBtn').addEventListener('click', (e) => {
            currentSortMode = currentSortMode === 'EN' ? 'ZH' : 'EN';
            e.target.innerText = `当前排序: ${currentSortMode === 'EN' ? '英文' : '中文'}品牌排序`;
            renderTable();
        });

        document.getElementById('brandFilterBtn').addEventListener('click', openBrandFilterModal);
        document.getElementById('resetBrandFilterBtn').addEventListener('click', resetBrandFilter);
        document.getElementById('applyBrandFilterBtn').addEventListener('click', applyBrandFilter);
        document.getElementById('cancelBrandFilterBtn').addEventListener('click', closeBrandFilterModal);
        document.getElementById('closeBrandModalX').addEventListener('click', closeBrandFilterModal);
        document.getElementById('brandModal').addEventListener('click', (event) => {
            if (event.target.id === 'brandModal') {
                closeBrandFilterModal();
            }
        });

        document.getElementById('carTypeFilterBtn').addEventListener('click', openCarTypeFilterModal);
        document.getElementById('resetCarTypeFilterBtn').addEventListener('click', resetCarTypeFilter);
        document.getElementById('applyCarTypeFilterBtn').addEventListener('click', applyCarTypeFilter);
        document.getElementById('cancelCarTypeFilterBtn').addEventListener('click', closeCarTypeFilterModal);
        document.getElementById('closeCarTypeModalX').addEventListener('click', closeCarTypeFilterModal);
        document.getElementById('carTypeModal').addEventListener('click', (event) => {
            if (event.target.id === 'carTypeModal') {
                closeCarTypeFilterModal();
            }
        });

        document.getElementById('carTableBody').addEventListener('change', (event) => {
            const target = event.target;
            if (target.classList.contains('owned-checkbox')) {
                const carId = decodeURIComponent(target.dataset.carId);
                toggleCar(carId, target.checked);
            }
        });

        function openImageModal(originalSrc, altText) {
            const imageModal = document.getElementById('imageModal');
            const preview = document.getElementById('imageModalPreview');

            if (currentPreviewSrc === originalSrc && imageModal.classList.contains('flex')) {
                closeImageModal();
                return;
            }

            currentPreviewSrc = originalSrc;
            preview.setAttribute('src', originalSrc);
            preview.setAttribute('alt', altText || '车辆原图');
            imageModal.classList.remove('hidden');
            imageModal.classList.add('flex');
        }

        function closeImageModal() {
            const imageModal = document.getElementById('imageModal');
            const preview = document.getElementById('imageModalPreview');
            imageModal.classList.add('hidden');
            imageModal.classList.remove('flex');
            preview.setAttribute('src', '');
            currentPreviewSrc = '';
        }

        document.getElementById('carTableBody').addEventListener('click', (event) => {
            const target = event.target;
            if (target.classList.contains('car-image')) {
                const originalSrc = target.dataset.fallback;
                openImageModal(originalSrc, target.getAttribute('alt'));
            }
        });

        document.getElementById('imageModal').addEventListener('click', closeImageModal);
        document.getElementById('imageModalPreview').addEventListener('click', closeImageModal);

        document.getElementById('openExportModalBtn').addEventListener('click', () => openSimpleModal('exportChoiceModal'));
        document.getElementById('openImportModalBtn').addEventListener('click', () => openSimpleModal('importChoiceModal'));

        document.getElementById('exportCopyBtn').addEventListener('click', async () => {
            await copyDataToClipboard();
            closeSimpleModal('exportChoiceModal');
        });

        document.getElementById('exportFileBtn').addEventListener('click', () => {
            exportData();
            closeSimpleModal('exportChoiceModal');
        });

        document.getElementById('exportCancelBtn').addEventListener('click', () => closeSimpleModal('exportChoiceModal'));

        document.getElementById('importClipboardBtn').addEventListener('click', async () => {
            await importFromClipboard();
            closeSimpleModal('importChoiceModal');
        });

        document.getElementById('importFileBtn').addEventListener('click', () => {
            closeSimpleModal('importChoiceModal');
            document.getElementById('importInput').click();
        });

        document.getElementById('importCancelBtn').addEventListener('click', () => closeSimpleModal('importChoiceModal'));

        document.getElementById('importInput').addEventListener('change', importData);

        document.getElementById('exportChoiceModal').addEventListener('click', (event) => {
            if (event.target.id === 'exportChoiceModal') {
                closeSimpleModal('exportChoiceModal');
            }
        });

        document.getElementById('importChoiceModal').addEventListener('click', (event) => {
            if (event.target.id === 'importChoiceModal') {
                closeSimpleModal('importChoiceModal');
            }
        });

        document.getElementById('toggleSortBtn').innerText = '当前排序: 中文品牌排序';

        document.getElementById('brandOptions').addEventListener('change', (event) => {
            const target = event.target;
            if (target.classList.contains('brand-filter-option')) {
                toggleDraftBrandFilter(target.dataset.brand, target.checked);
            }
        });

        document.getElementById('carTypeOptions').addEventListener('change', (event) => {
            const target = event.target;
            if (target.classList.contains('car-type-filter-option')) {
                toggleDraftCarTypeFilter(target.dataset.carType, target.checked);
            }
        });

        document.addEventListener('error', (event) => {
            const target = event.target;
            if (target && target.classList && target.classList.contains('car-image')) {
                const fallback = target.dataset.fallback;
                if (fallback && target.getAttribute('src') !== fallback) {
                    target.setAttribute('src', fallback);
                }
            }
        }, true);

        initApp();
    </script>
</body>

</html>
