<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地平线车辆收集库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 p-6">

    <div class="max-w-[1400px] mx-auto bg-white rounded-lg shadow-lg overflow-hidden">

        <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
            <h1 class="text-xl font-bold">地平线车辆收集库</h1>
            <div class="flex gap-4">
                <button id="toggleSortBtn"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded text-sm font-medium transition">
                    当前排序: 英文品牌排序
                </button>
                <button onclick="exportData()"
                    class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium transition">
                    导出进度
                </button>
                <label
                    class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded text-sm font-medium transition cursor-pointer">
                    导入进度
                    <input type="file" id="importInput" accept=".json" class="hidden" onchange="importData(event)">
                </label>
            </div>
        </div>

        <div class="overflow-x-auto no-scrollbar">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="bg-gray-200 text-gray-600 text-sm">
                        <th class="p-3 border-b text-center w-32">图片</th>
                        <th class="p-3 border-b text-center w-20">已获得</th>
                        <th class="p-3 border-b border-l border-gray-300">品牌</th>
                        <th class="p-3 border-b border-l border-gray-300">车名</th>
                        <th class="p-3 border-b border-l border-gray-300 text-center">年份</th>
                        <th class="p-3 border-b border-l border-gray-300">获取方式</th>
                        <th class="p-3 border-b border-l border-gray-300 text-right">价值 CR</th>
                        <th class="p-3 border-b border-l border-gray-300 text-center">稀有度</th>
                        <th class="p-3 border-b border-l border-gray-300 text-center">国籍</th>
                        <th class="p-3 border-b border-l border-gray-300 text-center">初始分</th>
                    </tr>
                </thead>
                <tbody id="carTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. 配置与枚举 ---
        // 稀有度背景色映射
        const rarityStyles = {
            '普通': 'bg-[#009b48] text-white',
            '稀有': 'bg-[#0092d6] text-white',
            '史诗': 'bg-[#68339b] text-white',
            '传说': 'bg-[#eab308] text-white',
            '极限竞速特别版': 'bg-gradient-to-r from-[#88189c] to-[#0168b4] text-white' // 渐变色实现
        };

        // 初始分文字颜色映射
        const getScoreColor = (scoreStr) => {
            if (scoreStr.startsWith('D')) return 'text-blue-500';
            if (scoreStr.startsWith('C')) return 'text-yellow-400';
            if (scoreStr.startsWith('B')) return 'text-orange-400';
            if (scoreStr.startsWith('A')) return 'text-red-500';
            if (scoreStr.startsWith('S1')) return 'text-purple-600';
            if (scoreStr.startsWith('S2')) return 'text-blue-600';
            if (scoreStr.startsWith('X')) return 'text-green-500';
            return 'text-gray-700';
        };

        // --- 2. 数据源 ---
        let carsData = [];

        // --- 初始化与获取数据 ---
        async function initApp() {
            try {
                const response = await fetch('./Cars.json');
                if (!response.ok) throw new Error('网络响应失败');
                carsData = await response.json();
                renderTable();
            } catch (error) {
                console.error("加载车辆数据失败:", error);
                document.getElementById('carTableBody').innerHTML = `<tr><td colspan="10" class="text-center p-4 text-red-500">无法加载车辆数据，请确保 Cars.json 存在。</td></tr>`;
            }
        }

        // 启动应用
        initApp();

        // --- 3. 核心状态 ---
        let currentSortMode = 'EN'; // 'EN' 或 'ZH'
        const LOCAL_STORAGE_KEY = 'fh_garage_data';

        // --- 4. 逻辑控制 ---

        // 获取本地存储的用户数据
        function getUserData() {
            return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || {};
        }

        // 切换复选框状态
        function toggleCar(id, checked) {
            const userData = getUserData();
            if (checked) {
                userData[id] = { owned: true };
            } else {
                delete userData[id]; // 未拥有则删除以节省空间
            }
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(userData));
        }

        // 排序逻辑
        function getSortedCars() {
            return [...carsData].sort((a, b) => {
                if (currentSortMode === 'EN') {
                    if (a.en_brand_order !== b.en_brand_order) return a.en_brand_order - b.en_brand_order;
                } else {
                    if (a.zh_brand_order !== b.zh_brand_order) return a.zh_brand_order - b.zh_brand_order;
                }
                // 品牌内排序
                return a.brand_internal_order - b.brand_internal_order;
            });
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('carTableBody');
            const sortedCars = getSortedCars();
            const userData = getUserData();

            tbody.innerHTML = sortedCars.map((car, index) => {
                const isOwned = userData[car.id]?.owned || false;
                const rowBg = index % 2 === 0 ? 'bg-gray-50' : 'bg-gray-100/50';
                const scoreColor = getScoreColor(car.initial_score);
                const rarityStyle = rarityStyles[car.rarity] || 'bg-gray-400 text-white';

                return `
                    <tr class="border-b ${rowBg} hover:bg-gray-100 transition">
                        <td class="p-2 text-center"><img src="${car.image}" alt="${car.name}" class="w-24 h-auto mx-auto drop-shadow-md"></td>
                        <td class="p-3 text-center border-l border-gray-300">
                            <input type="checkbox" class="w-5 h-5 cursor-pointer accent-green-600" 
                                ${isOwned ? 'checked' : ''} 
                                onchange="toggleCar('${car.id}', this.checked)">
                        </td>
                        <td class="p-3 border-l border-gray-300">${car.brand}</td>
                        <td class="p-3 border-l border-gray-300">${car.name}</td>
                        <td class="p-3 border-l border-gray-300 text-center">${car.year}</td>
                        <td class="p-3 border-l border-gray-300">${car.how_to_get}</td>
                        <td class="p-3 border-l border-gray-300 text-right">${car.cr}</td>
                        <td class="p-3 border-l border-white border-r text-center ${rarityStyle} font-medium">${car.rarity}</td>
                        <td class="p-3 border-l border-gray-300 text-center">${car.country}</td>
                        <td class="p-3 border-l border-gray-300 text-center font-bold ${scoreColor}">${car.initial_score}</td>
                    </tr>
                `;
            }).join('');
        }

        // 切换排序模式
        document.getElementById('toggleSortBtn').addEventListener('click', (e) => {
            currentSortMode = currentSortMode === 'EN' ? 'ZH' : 'EN';
            e.target.innerText = `当前排序: ${currentSortMode === 'EN' ? '英文' : '中文'}品牌排序`;
            renderTable();
        });

        // 导出数据
        function exportData() {
            const data = localStorage.getItem(LOCAL_STORAGE_KEY) || "{}";
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "fh_garage_backup.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 导入数据
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(parsed));
                    renderTable();
                    alert("数据导入成功！");
                } catch (error) {
                    alert("文件格式错误，导入失败！");
                }
                event.target.value = ''; // 清除文件选择，允许重复导入同一文件
            };
            reader.readAsText(file);
        }

        // 初始化
        // 实际场景下，你需要在这里写 fetch('data/cars.json').then(...) 来替换 mock 的 carsData
        renderTable();
    </script>
</body>

</html>
